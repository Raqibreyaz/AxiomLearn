- MongoDB text indexes treat a field named language as a special language override field by default. So if your document has language "en-US" or any app locale, MongoDB may throw language override unsupported. Fix it by changing the index’s language_override to another field name, or by setting a supported text-language value. Also remember to drop and recreate the old text index after changing the schema.

